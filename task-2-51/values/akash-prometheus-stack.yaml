grafana:
  adminPassword: admin123

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.codexakash.space
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.codexakash.space

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 2Gi

# Existing cluster CRDs already exist
crds:
  enabled: false

prometheusOperator:
  enabled: false

alertmanager:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.codexakash.space
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.codexakash.space

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        cpu: 200m
        memory: 500Mi

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.codexakash.space
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.codexakash.space

  prometheusSpec:
    scrapeInterval: 30s
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 300m
        memory: 2Gi
      limits:
        cpu: 1000m      # 1 core
        memory: 6Gi

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 150Mi
    limits:
      cpu: 200m
      memory: 300Mi

kubeStateMetrics:
  resources:
    requests:
      cpu: 50m
      memory: 150Mi
    limits:
      cpu: 150m
      memory: 300Mi