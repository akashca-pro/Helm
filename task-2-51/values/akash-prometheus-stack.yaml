grafana:
  adminPassword: admin123

  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - grafana.codexakash.space

    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.codexakash.space

  persistence:
    enabled: true
    size: 5Gi

# Existing cluster CRDs already exist
crds:
  enabled: false

# Reuse cluster-wide operator
prometheusOperator:
  enabled: false

alertmanager:
  enabled: true

  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - alertmanager.codexakash.space

    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.codexakash.space

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - prometheus.codexakash.space

    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.codexakash.space

  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 150Mi
    limits:
      cpu: 200m
      memory: 300Mi
