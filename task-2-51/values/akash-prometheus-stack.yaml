grafana:
  adminPassword: admin123

  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://akash-loki-stack.akash-c-a-monitoring.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.codexakash.space
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.codexakash.space

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1536Mi


# Existing cluster CRDs already exist
crds:
  enabled: false

prometheusOperator:
  enabled: false
  prometheusConfigReloader:
    image:
      tag: v0.91.0


alertmanager:
  enabled: true

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.codexakash.space
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.codexakash.space

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 20m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi


prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - prometheus.codexakash.space

    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.codexakash.space

  prometheusSpec:

    scrapeInterval: 60s

    retention: 24h

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce

          resources:
            requests:
              storage: 10Gi

    resources:
      requests:
        cpu: 200m
        memory: 1Gi

      limits:
        cpu: 1000m
        memory: 2Gi


nodeExporter:
  enabled: false

  resources:
    requests:
      cpu: 20m
      memory: 50Mi

    limits:
      cpu: 100m
      memory: 100Mi


kubeStateMetrics:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi

    limits:
      cpu: 100m
      memory: 100Mi